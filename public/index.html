    <!-- ══════════════════════════════════════════════════════
         FAQ SCHEMA — sube la posición en Google
    ══════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es Mathle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mathle es el juego de matemáticas diario, similar al Wordle pero con ecuaciones. Tienes 6 intentos para adivinar los valores que hacen válida la ecuación del día."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo se juega Mathle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Rellena los huecos de la ecuación con números. Si el valor está en la posición correcta se muestra en verde, si existe pero en otra posición en amarillo, y si no aparece en rojo. Tienes 6 intentos."
          }
        },
        {
          "@type": "Question",
          "name": "¿Es gratis Mathle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, Mathle es completamente gratuito. Puedes jugar sin registrarte, aunque crear una cuenta te permite guardar tu racha y aparecer en el ranking global."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cada cuánto cambia la ecuación?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La ecuación del modo diario cambia cada día a medianoche. Además hay un modo contrareloj donde puedes resolver tantas ecuaciones como puedas en 60 segundos."
          }
        }
      ]
    }
    </script>
